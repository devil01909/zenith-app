<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Library</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1e2329; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 4px solid #f0b90b; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 20px; box-sizing: border-box; background: #2b3139; color: white; }
        button { background: #f0b90b; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        h2 { color: #f0b90b; text-align: center; }
    </style>
</head>
<body>
    <h2>🚀 Zenith Cloud</h2>
    <input type="text" id="q" placeholder="Search your files..." oninput="search()">
    <div id="res"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function search() {
            const q = document.getElementById('q').value;
            if(q.length < 2) return;
            
            try {
                // Replace with your Termux IP if localhost fails
                const r = await fetch(`http://localhost:5000/search?q=${q}`);
                const data = await r.json();
                let h = '';
                data.forEach(i => {
                    h += `<div class="card">
                            <div style="margin-bottom:10px;"><b>${i.title}</b></div>
                            <button onclick="downloadFile('${i.file_name}')">Download File</button>
                          </div>`;
                });
                document.getElementById('res').innerHTML = h;
            } catch (e) {
                document.getElementById('res').innerHTML = "Server not connected.";
            }
        }

        function downloadFile(name) {
            tg.sendData(name); // Sends filename to the bot
            tg.close();
        }
    </script>
</body>
</html>
        <h2>🚀 Zenith Library</h2>
        <p>Your High-Speed Torrent Engine</p>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="মুভি, সফটওয়্যার বা স্টাডি ফাইল খুঁজুন..." oninput="searchLibrary()">
    </div>

    <div id="results">
        <p class="loading">লাইব্রেরি থেকে কিছু খুঁজুন...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // অ্যাপটিকে ফুল স্ক্রিন করবে
        tg.ready();

        async function searchLibrary() {
            const query = document.getElementById('searchInput').value;
            const resultsDiv = document.getElementById('results');

            if(query.length < 2) {
                resultsDiv.innerHTML = '<p class="loading">আরও কিছু টাইপ করুন...</p>';
                return;
            }

            try {
                // আপনার Termux এর লোকাল API (সার্ভার অন থাকতে হবে)
                // আপনার ফোনের IP চেক করতে Termux এ 'ifconfig' লিখে wlan0 এর IP টি এখানে বসাতে পারেন।
                const response = await fetch(`http://localhost:5000/search?q=${query}`);
                const data = await response.json();
                
                if (data.length === 0) {
                    resultsDiv.innerHTML = '<p class="loading">কিছু পাওয়া যায়নি! 🔍</p>';
                    return;
                }

                let html = '';
                data.forEach(item => {
                    html += `
                        <div class="item-card">
                            <span class="item-title">${item.title}</span>
                            <div class="item-meta">
                                <span class="category">⚡ Trending</span>
                                <button class="btn-download" onclick="sendToBot('${item.magnet}')">GET FILE</button>
                            </div>
                        </div>
                    `;
                });
                resultsDiv.innerHTML = html;
            } catch (e) {
                resultsDiv.innerHTML = '<p class="loading" style="color:#ff6b6b;">সার্ভার কানেক্ট হচ্ছে না! (server.py চালু আছে কি?)</p>';
            }
        }

        function sendToBot(magnet) {
            // টেলিগ্রাম বটের কাছে ম্যাগনেট লিঙ্কটি পাঠিয়ে দিবে
            tg.sendData(magnet);
            tg.close(); // কাজ শেষে মিনি অ্যাপ বন্ধ হবে
        }
    </script>
</body>
</html>
